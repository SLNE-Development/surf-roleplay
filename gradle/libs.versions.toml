[versions]
surf-npc-api = "1.21.7-1.4.2-SNAPSHOT"
loom = "1.11-SNAPSHOT"
netty = "4.2.4.Final"
datafixerupper = "8.0.16"
bytebuddy = "1.15.10"
kotlin-byte-buf-serializer = "1.1.0"
protoweaver = "1.4.9"
architectury-base = "3.4.161"
architectury-loom = "1.10.433"
architectury-api = "17.0.8"
neoforge = "21.8.32"

# Mod
minecraft = "1.21.8"
yarn-mappings = "1.21.8+build.1"
fabric-loader = "0.17.2"
fabric-kotlin = "1.13.5+kotlin.2.2.10"
