protoweaver-common = { module = "me.mrnavastar.protoweaver:common", version.ref = "protoweaver" }
protoweaver-fabric = { module = "me.mrnavastar.protoweaver:client", version.ref = "protoweaver" }
protoweaver-paper = { module = "me.mrnavastar.protoweaver:common", version.ref = "protoweaver" }

[plugins]
loom = { id = "fabric-loom", version.ref = "loom" }
architectury-base = { id = "architectury-plugin", version.ref = "architectury-base" }
architectury-loom = { id = "dev.architectury.loom", version.ref = "architectury-loom" }
